<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Speedrun Platformer - Action Update</title>
  <style>
    :root {
      --bg: #0b0b10;
      --panel: #121220;
      --fg: #e9e9f2;
      --muted: #9aa0aa;
      --accent: #7cffd7;
      --danger: #ff4d6d;
      --goal: #45ff7a;
      --replay: #64c8ff;
      --ghost: #ffc832;
    }

    html, body {
      height: 100%; margin: 0; background: var(--bg); color: var(--fg); font-family: system-ui, sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }

    .wrap { max-width: 950px; width: 100%; padding: 16px; box-sizing: border-box; }

    .card {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01));
      border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35); overflow: hidden; margin-bottom: 16px;
      display: flex; flex-direction: column;
    }

    .card h2 { 
        margin: 0; padding: 14px 20px; font-size: 18px; color: var(--fg); font-weight: 600; 
        display: flex; justify-content: space-between; align-items: center;
        background: rgba(0,0,0,0.2); border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    
    .timer-display { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 20px; color: var(--accent); }

    .pad { padding: 16px; position: relative; }
    canvas { display: block; width: 100%; height: auto; background: rgba(255, 255, 255, 0.02); border-radius: 12px; }

    .tips { color: var(--muted); font-size: 14px; line-height: 1.4; margin-top: 14px; text-align: center; }
    
    .status-overlay {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        font-size: 48px; font-weight: bold;
        text-shadow: 0 4px 15px rgba(0,0,0,0.9);
        pointer-events: none;
        display: none;
        text-align: center;
    }

    .controls-row {
        display: flex; gap: 12px; justify-content: center; margin-top: 5px;
    }

    button {
      appearance: none; border: none; border-radius: 12px; padding: 12px 18px; font-weight: 800;
      background: rgba(124, 255, 215, 0.12); color: var(--accent); border: 1px solid rgba(124, 255, 215, 0.30); 
      cursor: pointer; font-size: 14px; font-family: inherit; transition: all 0.2s ease;
    }
    button:hover { filter: brightness(1.2); background: rgba(124, 255, 215, 0.2); transform: translateY(-2px); }
    button:active { transform: translateY(0); }

    #gameContainer:fullscreen {
        background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0;
    }
    #gameContainer:fullscreen .card {
        width: 100vw; height: 100vh; border: none; border-radius: 0; margin: 0;
    }
    #gameContainer:fullscreen .pad {
        flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 20px;
    }
    #gameContainer:fullscreen canvas {
        flex: 1; object-fit: contain; max-height: calc(100vh - 120px); width: 100%;
    }
  </style>
</head>

<body>
  <div class="wrap" id="gameContainer">
    <div class="card">
      <h2>
          <span>Speedrun Platformer</span>
          <span class="timer-display" id="timer">0.00s</span>
      </h2>
      <div class="pad">
        <canvas id="cv" width="900" height="520"></canvas>
        <div id="winMsg" class="status-overlay" style="color: var(--goal);">LEVEL CLEARED!<br><span style="font-size:20px; color:#fff">Press 'R' to Restart</span></div>
        <div id="replayMsg" class="status-overlay" style="color: var(--replay); font-size:32px;">REPLAY MODE</div>
        <div class="tips" id="tipText">
          Controls: <b>W A S D</b> or <b>Arrows</b> | <b>S</b>: Drop ledges | <b>Hold toward @ walls</b> to cling/walljump | <b>!</b> are death blocks<br>
        </div>
      </div>
    </div>

    <div class="controls-row">
        <label style="display:flex; align-items:center; gap:8px; color:var(--muted); font-size:14px;">
          Agent
          <select id="agentSelect" style="background:#1a1a2b; color:var(--fg); border:1px solid rgba(255,255,255,0.2); border-radius:8px; padding:6px 8px;">
            <option value="human">Human</option>
            <option value="rule">RuleBased</option>
            <option value="planner">Planner (A*)</option>
            <option value="ppo">PPO</option>
            <option value="bcppo">BC+PPO</option>
          </select>
        </label>
        <button id="btnFullscreen">⛶ Fullscreen</button>
        <button id="btnReplayLast" style="color:var(--muted); border-color:var(--muted); background:rgba(255,255,255,0.05);">▶ Replay Last Run</button>
        <button id="btnReplayBest" style="color:var(--ghost); border-color:rgba(255,200,50,0.4); background:rgba(255,200,50,0.1);">★ Replay Best Win</button>
    </div>
  </div>

  <script>
    (() => {
      const cv = document.getElementById("cv"); 
      const ctx = cv.getContext("2d");
      const timerEl = document.getElementById("timer");
      const winMsgEl = document.getElementById("winMsg");
      const replayMsgEl = document.getElementById("replayMsg");
      const agentSelectEl = document.getElementById("agentSelect");

      // @ = Cling Wall, S = Shooter Enemy, R = Runner Enemy, G = Goal, ! = Death Block     
      const LEVEL = [
        "########################################!!####!!#########!!########",
        "#!......................###.....#.........R..........##...........#",
        "#!............@..###.....#......@--@#####--#####@#................#",
        "#!..........@....#..!...........@................@!...............#",
        "#!........@......#......@.......@#---###---####@.@...#@..!-#.....R#",
        "#!..#-----#......#......@.......#.R..............@.......@....#####",
        "#!..#.....#.............@.......#######........###--#####.........#",
        "#!..#-----#...@@@@......@.....................@!..........#..#....#",
        "#!..#.....#.......S.....@..S.............!@R..@!.!.@.....!#..#....#",
        "#!..#-----#.....@###@...#######################!...@.......##.!..!#",
        "#.......................!...!...!..!!..........R...@.R........!..!#",
        "###############################################################G###",
      ];
      
      const rows = LEVEL.length, cols = LEVEL[0].length, TILE = 24, WORLD_W = cols * TILE, WORLD_H = rows * TILE;
      const GRAV = 1800, MOVE_ACCEL = 5200, MAX_VX = 260, JUMP_VY = -520, FRICTION = 10, FIXED_DT = 1 / 60;

      const spawn = { x: 2 * TILE, y: 8 * TILE };
      let goalRect = null;
      let cameraX = 0;
      let timeElapsed = 0;
      
      let currentRun = [];
      let lastRun = [];
      let bestRun = [];
      let bestTime = Infinity;
      let isReplaying = false;
      let replayFrames = [];
      let replayIndex = 0;

      const keys = { left: false, right: false, jump: false, down: false, jumpPressed: false };
      const aiControlState = { left: false, right: false, jump: false, down: false };

      function makeAction(action = {}) {
        const left = !!action.left;
        const right = !!action.right;
        return {
          left: left && !right,
          right: right && !left,
          jump: !!action.jump,
          down: !!action.down,
        };
      }

      function tileCode(ch) {
        if (ch === ".") return 0;
        if (ch === "#") return 1;
        if (ch === "-") return 2;
        if (ch === "@") return 3;
        if (ch === "!") return 4;
        if (ch === "G") return 5;
        if (ch === "S") return 6;
        if (ch === "R") return 7;
        return -1;
      }

      function buildObservation() {
        const playerCenterX = player.x + player.w / 2;
        const playerCenterY = player.y + player.h / 2;
        const tileX = Math.floor(playerCenterX / TILE);
        const tileY = Math.floor(playerCenterY / TILE);
        const halfW = 7;
        const halfH = 5;
        const localTiles = [];
        for (let dy = -halfH; dy <= halfH; dy++) {
          const row = [];
          for (let dx = -halfW; dx <= halfW; dx++) {
            row.push(tileCode(tileAt(tileX + dx, tileY + dy)));
          }
          localTiles.push(row);
        }

        const nearestEnemies = enemies
          .filter((e) => !e.dead)
          .map((e) => ({ dx: e.x - player.x, dy: e.y - player.y, type: e.type, vx: e.vx, vy: e.vy }))
          .sort((a, b) => (a.dx * a.dx + a.dy * a.dy) - (b.dx * b.dx + b.dy * b.dy))
          .slice(0, 3);
        const nearestBullets = bullets
          .map((b) => ({ dx: b.x - player.x, dy: b.y - player.y, vx: b.vx, vy: 0 }))
          .sort((a, b) => (a.dx * a.dx + a.dy * a.dy) - (b.dx * b.dx + b.dy * b.dy))
          .slice(0, 4);

        return {
          schema: "obs_v1",
          player: {
            x: player.x, y: player.y, vx: player.vx, vy: player.vy,
            grounded: player.onGround, wallClingDir: player.touchingWallDir, alive: !player.dead,
          },
          localTiles,
          enemies: nearestEnemies,
          bullets: nearestBullets,
          goal: goalRect ? { dx: goalRect.x - player.x, dy: goalRect.y - player.y } : { dx: 0, dy: 0 },
        };
      }

      function isSolidCode(code) { return code === 1 || code === 2 || code === 3; }
      function getObsTile(obs, dx, dy) {
        const centerY = Math.floor(obs.localTiles.length / 2);
        const centerX = Math.floor(obs.localTiles[0].length / 2);
        const y = centerY + dy;
        const x = centerX + dx;
        if (y < 0 || y >= obs.localTiles.length || x < 0 || x >= obs.localTiles[0].length) return 1;
        return obs.localTiles[y][x];
      }
      function isGapAhead(obs, dir = 1) {
        if (!obs.player.grounded) return false;
        return !isSolidCode(getObsTile(obs, dir * 2, 2));
      }
      function isWallAhead(obs, dir = 1) {
        return isSolidCode(getObsTile(obs, dir, 0)) || isSolidCode(getObsTile(obs, dir, -1));
      }
      function isDeathAhead(obs, dir = 1) {
        return getObsTile(obs, dir, 1) === 4 || getObsTile(obs, dir * 2, 1) === 4 || getObsTile(obs, dir, 0) === 4;
      }
      function isIncomingBullet(obs, horizonFrames = 25) {
        return obs.bullets.some((b) => b.dx > -24 && b.dx < 190 && Math.abs(b.dy) < 26 && b.vx < 0 && Math.abs(b.dx / b.vx) < horizonFrames * FIXED_DT);
      }
      function isEnemyThreat(obs, radius = TILE * 2.5) {
        return obs.enemies.some((e) => Math.abs(e.dx) < radius && Math.abs(e.dy) < TILE * 1.5);
      }
      function shouldAvoidEnemyLanding(obs, dir = 1) {
        const dangerForward = obs.enemies.some((e) => e.dy > 6 && e.dy < TILE * 2.8 && e.dx * dir > 0 && Math.abs(e.dx) < TILE * 2.8);
        const dangerUnder = obs.enemies.some((e) => e.dy > 0 && e.dy < TILE * 2.2 && Math.abs(e.dx) < TILE * 1.2);
        return dangerForward || dangerUnder;
      }
      function shouldEvadeMidairEnemy(obs, dir = 1) {
        if (obs.player.grounded) return false;
        return obs.enemies.some((e) => e.dy > -6 && e.dy < TILE * 2.5 && Math.abs(e.dx) < TILE * 1.8 && e.dx * dir > -TILE * 0.5);
      }
      function directionRiskScore(obs, dir = 1) {
        let score = 0;
        if (isDeathAhead(obs, dir)) score += 100;
        if (isGapAhead(obs, dir) && obs.player.grounded) score += 35;
        if (isWallAhead(obs, dir) && obs.player.grounded) score += 8;
        const enemyRisk = obs.enemies.some((e) => e.dy > -TILE * 0.6 && e.dy < TILE * 2.2 && e.dx * dir > 0 && Math.abs(e.dx) < TILE * 2.5);
        if (enemyRisk) score += 70;
        return score;
      }
      function chooseSaferDirection(obs, preferredDir = 1) {
        const preferredRisk = directionRiskScore(obs, preferredDir);
        const oppositeDir = -preferredDir;
        const oppositeRisk = directionRiskScore(obs, oppositeDir);
        return oppositeRisk + 8 < preferredRisk ? oppositeDir : preferredDir;
      }
      function shouldWallJump(obs, dir = 1) {
        if (obs.player.wallClingDir === 0) return false;
        return obs.goal.dy < 20 || isWallAhead(obs, dir) || isDeathAhead(obs, dir);
      }
      function hasLowCeiling(obs) {
        return isSolidCode(getObsTile(obs, 0, -1)) || isSolidCode(getObsTile(obs, 1, -1)) || isSolidCode(getObsTile(obs, -1, -1));
      }
      function goalDistanceScore(obs) {
        return Math.hypot(obs.goal.dx, obs.goal.dy * 0.65);
      }

      class HumanAgent {
        reset() {}
        act() { return makeAction(keys); }
        onStep() {}
        onEpisodeEnd() {}
      }

      class RuleBasedAgent {
        constructor() {
          this.wallJumpCooldown = 0;
          this.stagnationFrames = 0;
          this.escapeFrames = 0;
          this.wallStuckFrames = 0;
          this.unstickFrames = 0;
          this.lastPos = null;
          this.lastGoalDistance = null;
          this.preferredDir = 1;
        }
        reset(obs) {
          this.wallJumpCooldown = 0;
          this.stagnationFrames = 0;
          this.escapeFrames = 0;
          this.wallStuckFrames = 0;
          this.unstickFrames = 0;
          this.lastPos = obs ? { x: obs.player.x, y: obs.player.y } : null;
          this.lastGoalDistance = obs ? goalDistanceScore(obs) : null;
          this.preferredDir = 1;
        }
        act(obs) {
          const action = { left: false, right: false, jump: false, down: false };

          if (this.lastPos) {
            const moved = Math.hypot(obs.player.x - this.lastPos.x, obs.player.y - this.lastPos.y);
            const currentGoalDistance = goalDistanceScore(obs);
            const goalImprovement = this.lastGoalDistance == null ? 0 : this.lastGoalDistance - currentGoalDistance;
            this.stagnationFrames = (moved < 1.2 || goalImprovement < 1.1) ? this.stagnationFrames + 1 : 0;
            this.lastGoalDistance = currentGoalDistance;
          }
          this.lastPos = { x: obs.player.x, y: obs.player.y };

          if (this.stagnationFrames > 40) {
            this.stagnationFrames = 0;
            this.escapeFrames = 55;
            this.preferredDir *= -1;
          }

          if (this.escapeFrames > 0) this.escapeFrames--;

          if (obs.player.wallClingDir !== 0 && hasLowCeiling(obs) && Math.abs(obs.player.vy) < 110) {
            this.wallStuckFrames++;
          } else {
            this.wallStuckFrames = 0;
          }

          if (this.wallStuckFrames > 16) {
            this.wallStuckFrames = 0;
            this.unstickFrames = 24;
            this.escapeFrames = Math.max(this.escapeFrames, 28);
            this.preferredDir = -obs.player.wallClingDir;
          }

          let dir = obs.goal.dx < -10 ? -1 : 1;
          if (this.escapeFrames > 0) dir = this.preferredDir;

          action.left = dir < 0;
          action.right = dir > 0;

          if (this.unstickFrames > 0) {
            this.unstickFrames--;
            action.left = obs.player.wallClingDir > 0;
            action.right = obs.player.wallClingDir < 0;
            action.jump = false;
            return makeAction(action);
          }

          if (isIncomingBullet(obs, 30)) {
            const nearestBullet = obs.bullets
              .filter((b) => b.dx > -30 && b.dx < 220 && Math.abs(b.dy) < 40)
              .sort((a, b) => Math.abs(a.dx) - Math.abs(b.dx))[0];
            const retreatFromBullet = nearestBullet ? (nearestBullet.dx > 0 ? -1 : 1) : -dir;
            const safeRetreatDir = chooseSaferDirection(obs, retreatFromBullet);

            action.left = safeRetreatDir < 0;
            action.right = safeRetreatDir > 0;
            if (obs.player.grounded) action.jump = true;
          }

          if (isEnemyThreat(obs, TILE * 2.2) && obs.player.grounded) action.jump = true;
          if (isDeathAhead(obs, dir) && obs.player.grounded) action.jump = true;
          if ((isGapAhead(obs, dir) || isWallAhead(obs, dir)) && obs.player.grounded) action.jump = true;

          if (shouldAvoidEnemyLanding(obs, dir) && obs.player.grounded) {
            action.jump = true;
            action.left = dir > 0;
            action.right = dir < 0;
          }

          if (shouldEvadeMidairEnemy(obs, dir)) {
            action.left = dir > 0;
            action.right = dir < 0;
          }

          if (shouldWallJump(obs, dir)) {
            const pushAwayFromWall = !hasLowCeiling(obs) || obs.player.vy > 80;
            action.left = pushAwayFromWall ? obs.player.wallClingDir < 0 : obs.player.wallClingDir > 0;
            action.right = pushAwayFromWall ? obs.player.wallClingDir > 0 : obs.player.wallClingDir < 0;
            if (this.wallJumpCooldown <= 0 && pushAwayFromWall) {
              action.jump = true;
              this.wallJumpCooldown = 6;
            }
          }

          this.wallJumpCooldown--;
          return makeAction(action);
        }
        onStep() {}
        onEpisodeEnd() {}
      }

      class AStarPlannerAgent {
        constructor() {
          this.planTiles = [];
          this.planCursor = 0;
          this.lastReplanFrame = -9999;
          this.stuckFrames = 0;
          this.lastPos = null;
          this.frameCount = 0;
          this.maxJumpHeightTiles = 4;
          this.maxJumpDistanceTiles = 5;
          this.maxDropTiles = 5;
          this.fallbackAgent = new RuleBasedAgent();
        }

        reset(obs) {
          this.planTiles = [];
          this.planCursor = 0;
          this.lastReplanFrame = -9999;
          this.stuckFrames = 0;
          this.lastPos = obs ? { x: obs.player.x, y: obs.player.y } : null;
          this.frameCount = 0;
          this.fallbackAgent.reset(obs);
          this.replan(obs);
        }

        isSolidGeometry(ch) {
          return ch === "#" || ch === "@" || ch === "-";
        }

        isBlockedGeometry(ch) {
          return ch === "#" || ch === "@";
        }

        isHazard(ch) {
          return ch === "!";
        }

        canOccupyTile(tx, ty) {
          if (tx < 0 || tx >= cols || ty < 0 || ty >= rows) return false;
          const feet = tileAt(tx, ty);
          const head = tileAt(tx, ty - 1);
          return !this.isBlockedGeometry(feet) && !this.isBlockedGeometry(head) && !this.isHazard(feet) && !this.isHazard(head);
        }

        hasSupport(tx, ty) {
          if (ty + 1 >= rows) return false;
          const below = tileAt(tx, ty + 1);
          return this.isSolidGeometry(below);
        }

        nodeKey(tx, ty) {
          return `${tx},${ty}`;
        }

        heuristic(ax, ay, bx, by) {
          return Math.abs(ax - bx) + Math.abs(ay - by) * 1.35;
        }

        getNeighbors(node) {
          const neighbors = [];

          for (const dir of [-1, 1]) {
            const ntx = node.x + dir;
            const nty = node.y;
            if (this.canOccupyTile(ntx, nty) && this.hasSupport(ntx, nty)) {
              neighbors.push({ x: ntx, y: nty, cost: 1.0 });
            }
          }

          for (let dx = -this.maxJumpDistanceTiles; dx <= this.maxJumpDistanceTiles; dx++) {
            if (dx === 0) continue;
            for (let dy = 1; dy <= this.maxJumpHeightTiles; dy++) {
              const ntx = node.x + dx;
              const nty = node.y - dy;
              if (!this.canOccupyTile(ntx, nty) || !this.hasSupport(ntx, nty)) continue;

              const xStep = dx > 0 ? 1 : -1;
              let clearArc = true;
              for (let x = node.x; x !== ntx; x += xStep) {
                if (!this.canOccupyTile(x, node.y - Math.min(dy, 2))) {
                  clearArc = false;
                  break;
                }
              }
              if (clearArc) neighbors.push({ x: ntx, y: nty, cost: 1.7 + Math.abs(dx) * 0.25 + dy * 0.2 });
            }
          }

          for (let dir of [-1, 1]) {
            const ntx = node.x + dir;
            for (let drop = 1; drop <= this.maxDropTiles; drop++) {
              const nty = node.y + drop;
              if (!this.canOccupyTile(ntx, nty)) break;
              if (this.hasSupport(ntx, nty)) {
                neighbors.push({ x: ntx, y: nty, cost: 1.2 + drop * 0.3 });
                break;
              }
            }
          }

          return neighbors;
        }

        findPath(start, goal) {
          const open = [{ x: start.x, y: start.y, f: 0 }];
          const gScore = new Map([[this.nodeKey(start.x, start.y), 0]]);
          const cameFrom = new Map();
          const closed = new Set();
          const budget = 3200;
          let explored = 0;

          while (open.length > 0 && explored < budget) {
            explored++;
            let bestIndex = 0;
            for (let i = 1; i < open.length; i++) {
              if (open[i].f < open[bestIndex].f) bestIndex = i;
            }
            const current = open.splice(bestIndex, 1)[0];
            const currentKey = this.nodeKey(current.x, current.y);
            if (closed.has(currentKey)) continue;

            if (Math.abs(current.x - goal.x) <= 1 && Math.abs(current.y - goal.y) <= 1) {
              const path = [{ x: current.x, y: current.y }];
              let k = currentKey;
              while (cameFrom.has(k)) {
                const prev = cameFrom.get(k);
                path.push(prev);
                k = this.nodeKey(prev.x, prev.y);
              }
              path.reverse();
              return path;
            }

            closed.add(currentKey);
            const currentG = gScore.get(currentKey) ?? Infinity;

            for (const next of this.getNeighbors(current)) {
              const nKey = this.nodeKey(next.x, next.y);
              if (closed.has(nKey)) continue;
              const candidate = currentG + next.cost;
              if (candidate >= (gScore.get(nKey) ?? Infinity)) continue;

              cameFrom.set(nKey, { x: current.x, y: current.y });
              gScore.set(nKey, candidate);
              const h = this.heuristic(next.x, next.y, goal.x, goal.y);
              open.push({ x: next.x, y: next.y, f: candidate + h });
            }
          }

          return [];
        }

        toTilePosition(obs) {
          const cx = obs.player.x + player.w * 0.5;
          const cy = obs.player.y + player.h * 0.5;
          return { x: Math.floor(cx / TILE), y: Math.floor(cy / TILE) };
        }

        findGoalTile() {
          if (!goalRect) return null;
          return {
            x: Math.floor((goalRect.x + goalRect.w * 0.5) / TILE),
            y: Math.floor((goalRect.y + goalRect.h * 0.75) / TILE),
          };
        }

        replan(obs) {
          const start = this.toTilePosition(obs);
          const goal = this.findGoalTile();
          if (!goal) {
            this.planTiles = [];
            this.planCursor = 0;
            return;
          }
          const path = this.findPath(start, goal);
          this.planTiles = path;
          this.planCursor = path.length > 1 ? 1 : 0;
          this.lastReplanFrame = this.frameCount;
        }

        maybeAdvancePlan(currentTile) {
          while (this.planCursor < this.planTiles.length) {
            const target = this.planTiles[this.planCursor];
            if (Math.abs(target.x - currentTile.x) <= 0 && Math.abs(target.y - currentTile.y) <= 0) {
              this.planCursor++;
            } else {
              break;
            }
          }
        }

        shouldUseFallback(obs) {
          if (this.planTiles.length === 0 || this.planCursor >= this.planTiles.length) return true;
          return false;
        }

        act(obs) {
          this.frameCount++;

          if (this.lastPos) {
            const moved = Math.hypot(obs.player.x - this.lastPos.x, obs.player.y - this.lastPos.y);
            this.stuckFrames = moved < 0.8 ? this.stuckFrames + 1 : 0;
          }
          this.lastPos = { x: obs.player.x, y: obs.player.y };

          const currentTile = this.toTilePosition(obs);
          this.maybeAdvancePlan(currentTile);

          const needsReplan = this.planTiles.length === 0
            || this.planCursor >= this.planTiles.length
            || this.stuckFrames > 40
            || this.frameCount - this.lastReplanFrame > 150;

          if (needsReplan) {
            this.stuckFrames = 0;
            this.replan(obs);
          }

          if (this.shouldUseFallback(obs)) {
            return this.fallbackAgent.act(obs);
          }

          const target = this.planTiles[this.planCursor];
          const targetX = target.x * TILE + TILE * 0.5;
          const targetY = target.y * TILE + TILE * 0.5;
          const dx = targetX - (obs.player.x + player.w * 0.5);
          const dy = targetY - (obs.player.y + player.h * 0.5);
          const action = { left: false, right: false, jump: false, down: false };

          if (Math.abs(dx) > 4) {
            action.left = dx < 0;
            action.right = dx > 0;
          }

          if (obs.player.grounded) {
            if (dy < -TILE * 0.35) action.jump = true;
            if (isGapAhead(obs, action.right ? 1 : -1) && Math.abs(dx) > TILE * 0.6) action.jump = true;
            if (isWallAhead(obs, action.right ? 1 : -1)) action.jump = true;
          }

          if (!obs.player.grounded && obs.player.wallClingDir !== 0 && dy < -8) {
            action.jump = true;
            action.left = obs.player.wallClingDir > 0;
            action.right = obs.player.wallClingDir < 0;
          }

          return makeAction(action);
        }

        onStep() {}
        onEpisodeEnd() {}
      }


      const DISCRETE_ACTIONS = [
        makeAction({}),
        makeAction({ right: true }),
        makeAction({ left: true }),
        makeAction({ jump: true }),
        makeAction({ right: true, jump: true }),
        makeAction({ left: true, jump: true }),
        makeAction({ down: true }),
      ];

      function actionToIndex(action) {
        const normalized = makeAction(action);
        for (let i = 0; i < DISCRETE_ACTIONS.length; i++) {
          const candidate = DISCRETE_ACTIONS[i];
          if (candidate.left === normalized.left && candidate.right === normalized.right && candidate.jump === normalized.jump && candidate.down === normalized.down) {
            return i;
          }
        }
        return 0;
      }

      function indexToAction(index) {
        return DISCRETE_ACTIONS[Math.max(0, Math.min(DISCRETE_ACTIONS.length - 1, index))];
      }

      function softmax(logits) {
        const maxLogit = Math.max(...logits);
        const exps = logits.map((v) => Math.exp(v - maxLogit));
        const sum = exps.reduce((a, b) => a + b, 0) || 1;
        return exps.map((v) => v / sum);
      }

      function sampleFromProbs(probs) {
        const r = Math.random();
        let cum = 0;
        for (let i = 0; i < probs.length; i++) {
          cum += probs[i];
          if (r <= cum) return i;
        }
        return probs.length - 1;
      }

      function dot(a, b) {
        let v = 0;
        for (let i = 0; i < a.length; i++) v += a[i] * b[i];
        return v;
      }

      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

      function extractPolicyFeatures(obs) {
        const dirToGoal = clamp(obs.goal.dx / (TILE * 20), -1, 1);
        const goalY = clamp(obs.goal.dy / (TILE * 10), -1, 1);
        const speedX = clamp(obs.player.vx / MAX_VX, -1, 1);
        const speedY = clamp(obs.player.vy / 700, -1, 1);
        const grounded = obs.player.grounded ? 1 : 0;
        const wall = obs.player.wallClingDir;
        const gapRight = isGapAhead(obs, 1) ? 1 : 0;
        const gapLeft = isGapAhead(obs, -1) ? 1 : 0;
        const wallRight = isWallAhead(obs, 1) ? 1 : 0;
        const wallLeft = isWallAhead(obs, -1) ? 1 : 0;
        const deathRight = isDeathAhead(obs, 1) ? 1 : 0;
        const deathLeft = isDeathAhead(obs, -1) ? 1 : 0;
        const bulletAlert = isIncomingBullet(obs, 25) ? 1 : 0;
        const enemyAlert = isEnemyThreat(obs, TILE * 2.5) ? 1 : 0;
        const nearestEnemyDx = obs.enemies[0] ? clamp(obs.enemies[0].dx / (TILE * 10), -1, 1) : 0;
        const nearestEnemyDy = obs.enemies[0] ? clamp(obs.enemies[0].dy / (TILE * 8), -1, 1) : 0;
        const nearestBulletDx = obs.bullets[0] ? clamp(obs.bullets[0].dx / (TILE * 12), -1, 1) : 0;

        return [1, dirToGoal, goalY, speedX, speedY, grounded, wall, gapRight, gapLeft, wallRight, wallLeft, deathRight, deathLeft, bulletAlert, enemyAlert, nearestEnemyDx, nearestEnemyDy, nearestBulletDx];
      }

      class PPOAgent {
        constructor(config = {}) {
          this.actionCount = DISCRETE_ACTIONS.length;
          this.featureCount = null;
          this.rolloutSize = config.rolloutSize || 256;
          this.gamma = config.gamma || 0.992;
          this.gaeLambda = config.gaeLambda || 0.95;
          this.clipEpsilon = config.clipEpsilon || 0.2;
          this.learningRate = config.learningRate || 0.012;
          this.valueCoef = config.valueCoef || 0.5;
          this.entropyCoef = config.entropyCoef || 0.01;
          this.epochs = config.epochs || 3;
          this.explore = config.explore ?? true;
          this.rollout = [];
          this.lastTransition = null;
          this.policy = null;
          this.valueWeights = null;
        }

        initializeModel(obs) {
          if (this.policy && this.valueWeights) return;
          this.featureCount = extractPolicyFeatures(obs).length;
          this.policy = Array.from({ length: this.actionCount }, () => Array.from({ length: this.featureCount }, () => (Math.random() - 0.5) * 0.02));
          this.valueWeights = Array.from({ length: this.featureCount }, () => (Math.random() - 0.5) * 0.02);
        }

        reset(obs) {
          if (obs) this.initializeModel(obs);
          this.lastTransition = null;
        }

        computeLogits(features) { return this.policy.map((weights) => dot(weights, features)); }
        value(features) { return dot(this.valueWeights, features); }

        act(obs) {
          this.initializeModel(obs);
          const features = extractPolicyFeatures(obs);
          const logits = this.computeLogits(features);
          const probs = softmax(logits);
          const actionIndex = this.explore ? sampleFromProbs(probs) : probs.indexOf(Math.max(...probs));
          this.lastTransition = {
            features,
            actionIndex,
            logProb: Math.log(Math.max(probs[actionIndex], 1e-8)),
            value: this.value(features),
          };
          return indexToAction(actionIndex);
        }

        onStep(transition) {
          if (!this.lastTransition) return;
          this.rollout.push({ ...this.lastTransition, reward: transition.reward, done: transition.done });
          if (this.rollout.length >= this.rolloutSize) this.trainOnRollout();
        }

        discountedAdvantages(steps) {
          const adv = new Array(steps.length).fill(0);
          const returns = new Array(steps.length).fill(0);
          let gae = 0;
          let nextValue = 0;
          for (let t = steps.length - 1; t >= 0; t--) {
            const delta = steps[t].reward + this.gamma * nextValue * (steps[t].done ? 0 : 1) - steps[t].value;
            gae = delta + this.gamma * this.gaeLambda * (steps[t].done ? 0 : 1) * gae;
            adv[t] = gae;
            returns[t] = adv[t] + steps[t].value;
            nextValue = steps[t].value;
          }
          const mean = adv.reduce((a, b) => a + b, 0) / Math.max(1, adv.length);
          const variance = adv.reduce((a, b) => a + (b - mean) * (b - mean), 0) / Math.max(1, adv.length);
          const std = Math.sqrt(variance) || 1;
          for (let i = 0; i < adv.length; i++) adv[i] = (adv[i] - mean) / std;
          return { adv, returns };
        }

        trainOnRollout() {
          if (!this.policy || !this.valueWeights) return;
          if (this.rollout.length < 32) return;
          const batch = this.rollout.splice(0, this.rollout.length);
          const { adv, returns } = this.discountedAdvantages(batch);
          for (let epoch = 0; epoch < this.epochs; epoch++) {
            for (let i = 0; i < batch.length; i++) {
              const sample = batch[i];
              const logits = this.computeLogits(sample.features);
              const probs = softmax(logits);
              const ratio = Math.exp(Math.log(Math.max(probs[sample.actionIndex], 1e-8)) - sample.logProb);
              const clippedRatio = clamp(ratio, 1 - this.clipEpsilon, 1 + this.clipEpsilon);
              const policyScale = ((ratio > 1 && adv[i] > 0) || (ratio < 1 && adv[i] < 0) ? clippedRatio : ratio) * adv[i];

              for (let a = 0; a < this.actionCount; a++) {
                const gradLogPi = (a === sample.actionIndex ? 1 : 0) - probs[a];
                for (let f = 0; f < this.featureCount; f++) {
                  this.policy[a][f] += this.learningRate * policyScale * gradLogPi * sample.features[f];
                }
              }

              const valueError = returns[i] - this.value(sample.features);
              for (let f = 0; f < this.featureCount; f++) {
                this.valueWeights[f] += this.learningRate * this.valueCoef * valueError * sample.features[f];
              }
            }
          }
        }

        onEpisodeEnd() {
          if (this.rollout.length >= 64) this.trainOnRollout();
          this.lastTransition = null;
        }
      }

      class BCPPOAgent extends PPOAgent {
        constructor() {
          super({ learningRate: 0.008, rolloutSize: 192, epochs: 2 });
          this.bcWarmStarted = false;
          this.teacherRule = new RuleBasedAgent();
          this.teacherPlanner = new AStarPlannerAgent();
        }

        reset(obs) {
          if (!this.bcWarmStarted) {
            this.runBehaviorCloningWarmstart(obs);
            this.bcWarmStarted = true;
          }
          super.reset(obs);
        }

        runBehaviorCloningWarmstart(obs) {
          const dataset = [];
          this.teacherRule.reset(obs);
          this.teacherPlanner.reset(obs);
          for (let i = 0; i < 800; i++) {
            const sampleObs = buildObservation();
            const teacher = (sampleObs.enemies.length > 0 || sampleObs.bullets.length > 0) ? this.teacherRule : this.teacherPlanner;
            dataset.push({ features: extractPolicyFeatures(sampleObs), actionIndex: actionToIndex(teacher.act(sampleObs)) });
          }

          for (let epoch = 0; epoch < 8; epoch++) {
            for (const sample of dataset) {
              const probs = softmax(this.computeLogits(sample.features));
              for (let a = 0; a < this.actionCount; a++) {
                const grad = (a === sample.actionIndex ? 1 : 0) - probs[a];
                for (let f = 0; f < this.featureCount; f++) {
                  this.policy[a][f] += 0.02 * grad * sample.features[f];
                }
              }
            }
          }
        }
      }

      class AgentManager {
        constructor() {
          this.agents = {
            human: new HumanAgent(),
            rule: new RuleBasedAgent(),
            planner: new AStarPlannerAgent(),
            ppo: new PPOAgent(),
            bcppo: new BCPPOAgent(),
          };
          this.activeKey = "human";
        }
        setActive(key) {
          this.activeKey = this.agents[key] ? key : "human";
          this.agents[this.activeKey].reset(buildObservation());
        }
        isActive(key) {
          return this.activeKey === key;
        }
        getAction(obs = buildObservation()) {
          return this.agents[this.activeKey].act(obs);
        }
        onStep(transition) {
          this.agents[this.activeKey].onStep?.(transition);
        }
        onEpisodeEnd(summary) {
          this.agents[this.activeKey].onEpisodeEnd?.(summary);
        }
      }

      const agentManager = new AgentManager();
      agentSelectEl.addEventListener("change", () => {
        agentManager.setActive(agentSelectEl.value);
        resetGame();
      });

      function applyControlAction(action) {
        const nextAction = makeAction(action);
        keys.left = nextAction.left;
        keys.right = nextAction.right;
        keys.down = nextAction.down;
        keys.jumpPressed = !aiControlState.jump && nextAction.jump;
        keys.jump = nextAction.jump;
        aiControlState.left = nextAction.left;
        aiControlState.right = nextAction.right;
        aiControlState.jump = nextAction.jump;
        aiControlState.down = nextAction.down;
      }

      window.addEventListener('keydown', (e) => {
          if (["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.code)) e.preventDefault();
          if (e.key === 'a' || e.key === 'ArrowLeft') keys.left = true;
          if (e.key === 'd' || e.key === 'ArrowRight') keys.right = true;
          if (e.key === 'w' || e.key === 'ArrowUp' || e.code === 'Space') {
              if (!keys.jump) keys.jumpPressed = true;
              keys.jump = true;
          }
          if (e.key === 's' || e.key === 'ArrowDown') keys.down = true;
          if (e.key === 'r' || e.key === 'R') resetGame();
      }, { passive: false });

      window.addEventListener('keyup', (e) => {
          if (e.key === 'a' || e.key === 'ArrowLeft') keys.left = false;
          if (e.key === 'd' || e.key === 'ArrowRight') keys.right = false;
          if (e.key === 'w' || e.key === 'ArrowUp' || e.code === 'Space') keys.jump = false;
          if (e.key === 's' || e.key === 'ArrowDown') keys.down = false;
      });

      document.getElementById("btnFullscreen").addEventListener("click", () => {
          const elem = document.getElementById("gameContainer");
          if (!document.fullscreenElement) elem.requestFullscreen().catch(err => console.error(err));
          else document.exitFullscreen();
      });

      function startReplay(runType) {
          if (runType === 'last' && lastRun.length > 0) replayFrames = lastRun;
          else if (runType === 'best' && bestRun.length > 0) replayFrames = bestRun;
          else { alert(runType === 'best' ? "You haven't won a game yet to save a best run!" : "No recent run found!"); return; }
          
          isReplaying = true; replayIndex = 0; winMsgEl.style.display = 'none';
          replayMsgEl.style.display = 'block'; setTimeout(() => replayMsgEl.style.display = 'none', 1500);
      }

      document.getElementById("btnReplayLast").addEventListener("click", () => startReplay('last'));
      document.getElementById("btnReplayBest").addEventListener("click", () => startReplay('best'));

      function tileAt(tx, ty) { return (tx < 0 || ty < 0 || tx >= cols || ty >= rows) ? "#" : LEVEL[ty][tx]; }
      function isSolid(ch) { return ch === "#" || ch === "-" || ch === "@"; }
      function overlaps(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }

      let enemies = [];
      let bullets = [];

      class Bullet {
          constructor(x, y, dir) {
              this.x = x; this.y = y; this.w = 6; this.h = 6;
              this.vx = dir * 300; this.dead = false;
          }
          update() {
              this.x += this.vx * FIXED_DT;
              const tx = Math.floor(this.x / TILE), ty = Math.floor(this.y / TILE);
              if (isSolid(tileAt(tx, ty))) this.dead = true;
          }
      }

      class Enemy {
          constructor(x, y, type) {
              this.x = x; this.y = y; this.w = 18; this.h = 22;
              this.type = type; // 'S' or 'R'
              this.vx = -60; this.vy = 0; this.dead = false;
              this.facingLeft = true; this.lastShot = 0;
          }

          hasLineOfSight(px, py) {
              if (Math.abs(this.y - py) > TILE * 1.5) return false;
              if (Math.abs(this.x - px) > TILE * 12) return false;
              
              let startTx = Math.floor(Math.min(this.x, px) / TILE);
              let endTx = Math.floor(Math.max(this.x, px) / TILE);
              let ty = Math.floor((this.y + this.h / 2) / TILE);
              
              for (let tx = startTx; tx <= endTx; tx++) {
                  if (isSolid(tileAt(tx, ty)) && tileAt(tx, ty) !== "-") return false;
              }
              return true; 
          }

          update() {
              this.vy += GRAV * FIXED_DT;
              let canSeePlayer = !player.dead && this.hasLineOfSight(player.x, player.y);

              if (this.type === 'S') {
                  const playerIsLeft = player.x < this.x;
                  const facingPlayer = this.facingLeft === playerIsLeft;

                  if (canSeePlayer) {
                      this.vx = 0;
                      if (facingPlayer && timeElapsed - this.lastShot > 1.5) {
                          this.lastShot = timeElapsed;
                          let bX = this.facingLeft ? this.x - 6 : this.x + this.w;
                          bullets.push(new Bullet(bX, this.y + 10, this.facingLeft ? -1 : 1));
                      }
                      this.facingLeft = playerIsLeft;
                  } else {
                      this.vx = this.facingLeft ? -40 : 40;
                  }
              } else if (this.type === 'R') {
                  if (canSeePlayer) {
                      let dir = player.x < this.x ? -1 : 1;
                      this.vx = dir * 180;
                      this.facingLeft = dir < 0;
                  } else {
                      this.vx = this.facingLeft ? -60 : 60;
                  }
              }

              // Apply X Physics & Collision
              this.x += this.vx * FIXED_DT;
              let hitWallX = false;
              
              // Determine current grid bounds for X check
              let left = Math.floor(this.x / TILE), right = Math.floor((this.x + this.w) / TILE);
              let top = Math.floor(this.y / TILE), bottom = Math.floor((this.y + this.h - 1) / TILE);

              for (let ty = top; ty <= bottom; ty++) {
                  for (let tx = left; tx <= right; tx++) {
                      let tile = tileAt(tx, ty);
                      if (isSolid(tile) && tile !== "-") {
                          hitWallX = true;
                          if (this.vx > 0) this.x = tx * TILE - this.w;
                          else if (this.vx < 0) this.x = tx * TILE + TILE;
                          this.vx = 0;
                      } else if (tile === "!") {
                          // Prevent enemies from casually walking into death blocks
                          hitWallX = true;
                          if (this.vx > 0) this.x = tx * TILE - this.w;
                          else if (this.vx < 0) this.x = tx * TILE + TILE;
                          this.vx = 0;
                      }
                  }
              }

              if (hitWallX && !canSeePlayer) this.facingLeft = !this.facingLeft;

              // Apply Y Physics & Recalculate Collision bounds!
              this.y += this.vy * FIXED_DT;
              
              left = Math.floor(this.x / TILE); right = Math.floor((this.x + this.w) / TILE);
              top = Math.floor(this.y / TILE); bottom = Math.floor((this.y + this.h) / TILE);

              for (let ty = top; ty <= bottom; ty++) {
                  for (let tx = left; tx <= right; tx++) {
                      if (isSolid(tileAt(tx, ty))) {
                          const tr = { x: tx * TILE, y: ty * TILE, w: TILE, h: TILE };
                          if (overlaps(this, tr)) {
                              if (this.vy > 0) { this.y = tr.y - this.h; this.vy = 0; }
                          }
                      }
                  }
              }
          }
      }

      class Player {
        constructor() {
          this.x = spawn.x; this.y = spawn.y; this.w = 18; this.h = 22;
          this.prevX = this.x; this.prevY = this.y;
          this.vx = 0; this.vy = 0; this.onGround = false; this.dead = false; this.won = false;
          this.touchingWallDir = 0;
        }

        collideAndResolve(axis) {
          const left = Math.floor(this.x / TILE), right = Math.floor((this.x + this.w) / TILE);
          const top = Math.floor(this.y / TILE), bottom = Math.floor((this.y + this.h) / TILE);
          let hit = false;
          
          if (axis === "x") this.touchingWallDir = 0;

          for (let ty = top - 1; ty <= bottom + 1; ty++) {
            for (let tx = left - 1; tx <= right + 1; tx++) {
              const tile = tileAt(tx, ty);
              
              // Check Death Block Collision
              if (tile === "!") {
                  const tr = { x: tx * TILE, y: ty * TILE, w: TILE, h: TILE };
                  if (overlaps(this, tr)) {
                      this.dead = true;
                  }
              }
              
              if (!isSolid(tile)) continue;
              
              const tr = { x: tx * TILE, y: ty * TILE, w: TILE, h: TILE };
              if (!overlaps(this, tr)) continue;
              
              if (tile === "-") {
                  if (axis === "x" || this.vy <= 0 || keys.down) continue;
                  const prevBottom = (this.y - this.vy * FIXED_DT) + this.h;
                  if (prevBottom > tr.y + 0.1) continue; 
              }

              hit = true;
              const penL = (this.x + this.w) - tr.x, penR = (tr.x + tr.w) - this.x;
              const penT = (this.y + this.h) - tr.y, penB = (tr.y + tr.h) - this.y;
              
              if (axis === "x") {
                if (tile === "@") {
                    if (this.vx > 0) this.touchingWallDir = 1;
                    if (this.vx < 0) this.touchingWallDir = -1;
                }
                if (this.vx > 0) { this.x -= penL; this.vx = 0; } else if (this.vx < 0) { this.x += penR; this.vx = 0; }
              } else {
                if (this.vy > 0) { 
                    this.y -= penT; this.vy = 0; this.onGround = true; 
                } else if (this.vy < 0 && tile !== "-") { 
                    this.y += penB; this.vy = 0; 
                }
              }
            }
          }
          return hit;
        }

        update() {
          if (this.dead || this.won) return;

          let ax = 0;
          if (keys.right) ax += 1;
          if (keys.left) ax -= 1;

          const wasGrounded = this.onGround; 
          this.onGround = false;

          this.vx += ax * MOVE_ACCEL * FIXED_DT;
          this.vx = Math.max(-MAX_VX, Math.min(MAX_VX, this.vx));
          
          if (ax === 0 || (ax < 0 && this.vx > 0) || (ax > 0 && this.vx < 0)) {
             this.vx *= Math.exp(-FRICTION * FIXED_DT);
          }

          if (keys.jump && wasGrounded) this.vy = JUMP_VY; 
          this.vy += GRAV * FIXED_DT;

          // Wall Cling & Jump Logic
          if (this.touchingWallDir !== 0 && !wasGrounded) {
              let holdingTowardsWall = (this.touchingWallDir === 1 && keys.right) || (this.touchingWallDir === -1 && keys.left);
              
              if (holdingTowardsWall) {
                  if (this.vy > 60) this.vy = 60; 
                  
                  if (keys.jumpPressed) {
                      this.vy = JUMP_VY * 0.9;
                      this.vx = -this.touchingWallDir * MAX_VX * 1.5; 
                  }
              }
          }

          this.prevX = this.x;
          this.prevY = this.y;

          this.x += this.vx * FIXED_DT; this.collideAndResolve("x");
          this.y += this.vy * FIXED_DT; this.collideAndResolve("y");

          if (this.y > WORLD_H + 120) this.dead = true;
          if (goalRect && overlaps(this, goalRect)) this.won = true;
          
          keys.jumpPressed = false;
        }
      }

      let player = new Player();

      function parseLevel() {
        enemies = [];
        bullets = [];
        for (let y = 0; y < rows; y++) {
          for (let x = 0; x < cols; x++) {
            let ch = LEVEL[y][x];
            if (ch === "G") goalRect = { x: x * TILE, y: y * TILE - TILE, w: TILE, h: TILE * 2 };
            if (ch === "S" || ch === "R") enemies.push(new Enemy(x * TILE, y * TILE, ch));
          }
        }
      }

      function resetGame() {
          if (!isReplaying && currentRun.length > 0) {
              lastRun = [...currentRun];
              agentManager.onEpisodeEnd({ won: player.won, dead: player.dead, timeElapsed, frames: currentRun.length });
              if (player.won && timeElapsed < bestTime) {
                  bestTime = timeElapsed;
                  bestRun = [...currentRun];
              }
          }

          player = new Player();
          parseLevel();
          timeElapsed = 0;
          currentRun = [];
          isReplaying = false;
          replayIndex = 0;
          
          winMsgEl.style.display = 'none';
          replayMsgEl.style.display = 'none';
          timerEl.textContent = "0.00s";
      }

      function updateSimulation() {
        if (isReplaying) {
            if (replayIndex < replayFrames.length) {
                let state = replayFrames[replayIndex];
                player.x = state.x; player.y = state.y; player.dead = state.dead; player.won = state.won;
                timeElapsed = replayIndex * FIXED_DT;
                timerEl.textContent = timeElapsed.toFixed(2) + "s (REPLAY)";
                replayIndex++;
            } else { setTimeout(() => resetGame(), 500); }
        } else {
            if (player.dead) { resetGame(); return; }

            if (!player.won) {
                timeElapsed += FIXED_DT;
                timerEl.textContent = timeElapsed.toFixed(2) + "s";
            } else { winMsgEl.style.display = 'block'; }

            const obsBefore = buildObservation();
            const prevAlive = !player.dead;
            applyControlAction(agentManager.getAction(obsBefore));

            player.update();
            currentRun.push({ x: player.x, y: player.y, dead: player.dead, won: player.won });
            
            const plannerStaticMode = agentManager.isActive("planner");
            if (!plannerStaticMode) {
              for (let i = bullets.length - 1; i >= 0; i--) {
                  bullets[i].update();
                  if (bullets[i].dead) bullets.splice(i, 1);
                  else if (overlaps(bullets[i], player)) player.dead = true;
              }

              for (let i = enemies.length - 1; i >= 0; i--) {
                  let e = enemies[i];
                  if (e.dead) continue;
                  e.update();
                  
                  if (overlaps(player, e)) {
                      const prevBottom = player.prevY + player.h;
                      const enemyTop = e.y;
                      const fromAboveLastFrame = prevBottom <= enemyTop + 6;
                      const fromAboveNow = player.y + player.h <= e.y + e.h * 0.65;
                      const isDescending = player.vy > 20;

                      if (isDescending && (fromAboveLastFrame || fromAboveNow)) {
                          e.dead = true;
                          player.vy = JUMP_VY * 0.8;
                          player.y = Math.min(player.y, e.y - player.h);
                      } else {
                          player.dead = true;
                      }
                  }
              }
            }

            const nextObs = buildObservation();
            const prevGoalDist = goalDistanceScore(obsBefore);
            const nextGoalDist = goalDistanceScore(nextObs);
            const progressReward = clamp((prevGoalDist - nextGoalDist) / TILE, -0.18, 0.5);
            const timePenalty = -0.002;
            const deathPenalty = (prevAlive && player.dead) ? -1.0 : 0;
            const winBonus = player.won ? 2.5 : 0;
            const hazardPenalty = (isIncomingBullet(obsBefore, 20) || isEnemyThreat(obsBefore, TILE * 2.2)) ? -0.003 : 0;
            agentManager.onStep({
              reward: progressReward + timePenalty + deathPenalty + winBonus + hazardPenalty,
              done: player.dead || player.won,
              observation: obsBefore,
              nextObservation: nextObs,
            });
        }

        const targetCam = player.x - cv.width * 0.35;
        cameraX += (targetCam - cameraX) * 0.12;
        cameraX = Math.max(0, Math.min(WORLD_W - cv.width, cameraX));
      }

      function draw() {
        ctx.clearRect(0, 0, cv.width, cv.height);
        ctx.fillStyle = "rgba(255,255,255,0.02)"; ctx.fillRect(0, 0, cv.width, cv.height);

        const cam = cameraX;
        const startTx = Math.max(0, Math.floor(cam / TILE) - 2);
        const endTx = Math.min(cols - 1, Math.floor((cam + cv.width) / TILE) + 2);
        
        for (let y = 0; y < rows; y++) {
          for (let x = startTx; x <= endTx; x++) {
            const ch = LEVEL[y][x]; if (ch === ".") continue;
            const sx = x * TILE - cam, sy = y * TILE;
            
            if (ch === "#") { ctx.fillStyle = "rgba(58,58,85,0.95)"; ctx.fillRect(sx, sy, TILE, TILE); }
            if (ch === "@") { ctx.fillStyle = "rgba(60, 150, 160, 0.8)"; ctx.fillRect(sx, sy, TILE, TILE); }
            if (ch === "-") { ctx.fillStyle = "rgba(100,150,200,0.8)"; ctx.fillRect(sx, sy, TILE, TILE / 4); }
            if (ch === "!") { ctx.fillStyle = "rgba(255, 77, 109, 0.8)"; ctx.fillRect(sx, sy + TILE/2, TILE, TILE/2); } // Draw spikes/lava on lower half
            if (ch === "G") { ctx.fillStyle = "rgba(69,255,122,0.55)"; ctx.fillRect(sx, sy - TILE, TILE, TILE * 2); }
          }
        }

        ctx.fillStyle = "#ffaa00";
        for (let b of bullets) { ctx.fillRect(b.x - cam, b.y, b.w, b.h); }

        for (let e of enemies) {
            if (e.dead) continue;
            ctx.fillStyle = e.type === 'R' ? "rgba(255, 77, 109, 1)" : "rgba(200, 50, 200, 1)";
            ctx.fillRect(e.x - cam, e.y, e.w, e.h);
            
            ctx.fillStyle = "#fff";
            let eyeX = e.facingLeft ? e.x - cam + 2 : e.x - cam + e.w - 6;
            ctx.fillRect(eyeX, e.y + 4, 4, 4);
        }

        if (!isReplaying && bestRun.length > 0) {
            let ghostFrameIndex = Math.min(currentRun.length, bestRun.length - 1);
            let ghostState = bestRun[ghostFrameIndex];
            if (ghostState) {
                ctx.fillStyle = "rgba(255, 200, 50, 0.4)";
                ctx.fillRect(ghostState.x - cam, ghostState.y, 18, 22);
            }
        }

        if (!player.dead) {
            ctx.fillStyle = isReplaying ? "rgba(100, 200, 255, 0.85)" : "rgba(124, 255, 215, 1)";
            ctx.fillRect(player.x - cam, player.y, player.w, player.h);
        }
      }

      let lastTime = performance.now();
      let accumulator = 0;

      function frame(currentTime) {
        let dt = (currentTime - lastTime) / 1000;
        if (dt > 0.1) dt = 0.1; 
        lastTime = currentTime;
        accumulator += dt;

        while (accumulator >= FIXED_DT) {
            updateSimulation(); accumulator -= FIXED_DT;
        }

        draw(); requestAnimationFrame(frame);
      }

      parseLevel();
      requestAnimationFrame(frame);
    })();
  </script>
</body>
